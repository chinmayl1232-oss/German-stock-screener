<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="W2 Scanner">
<meta name="theme-color" content="#020917">
<title>Wave-2 Scanner · XETRA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #020917;
    --surface:  #080f1f;
    --border:   #111c30;
    --muted:    #1e2d44;
    --text:     #dde6f0;
    --dim:      #3d5068;
    --cyan:     #00d4ff;
    --green:    #23e87a;
    --amber:    #f5a623;
    --red:      #ff5757;
    --purple:   #9b7fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }

body {
font-family: ‘DM Mono’, monospace;
background: var(–bg);
color: var(–text);
display: flex;
flex-direction: column;
height: 100dvh;
}

/* ── status bar spacer for iOS ── */
.ios-top { height: env(safe-area-inset-top); background: var(–bg); }
.ios-bot { height: env(safe-area-inset-bottom); background: var(–bg); }

/* ── header ── */
header {
flex-shrink: 0;
padding: 14px 20px 12px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
background: var(–bg);
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-title {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 18px;
letter-spacing: -.01em;
color: var(–text);
}
.header-sub { font-size: 10px; color: var(–dim); letter-spacing: .08em; }
.header-meta { text-align: right; }
.run-date { font-size: 10px; color: var(–dim); }
.match-count {
font-family: ‘Syne’, sans-serif;
font-size: 22px;
font-weight: 700;
color: var(–cyan);
line-height: 1;
}
.match-label { font-size: 9px; color: var(–dim); letter-spacing: .08em; }

/* ── live dot ── */
.dot {
width: 6px; height: 6px; border-radius: 50%;
background: var(–green);
display: inline-block;
animation: pulse 2s infinite;
margin-right: 5px;
vertical-align: middle;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

/* ── filter bar ── */
.filter-bar {
flex-shrink: 0;
display: flex;
gap: 6px;
padding: 10px 16px;
overflow-x: auto;
border-bottom: 1px solid var(–border);
scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.chip {
flex-shrink: 0;
border: 1px solid var(–border);
background: transparent;
color: var(–dim);
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: .08em;
padding: 5px 11px;
border-radius: 20px;
cursor: pointer;
transition: all .15s;
white-space: nowrap;
}
.chip.active {
background: #001a2e;
color: var(–cyan);
border-color: #00d4ff40;
}

/* ── sort row ── */
.sort-row {
flex-shrink: 0;
display: flex;
align-items: center;
gap: 4px;
padding: 8px 16px;
border-bottom: 1px solid var(–border);
font-size: 9px;
color: var(–dim);
letter-spacing: .08em;
overflow-x: auto;
scrollbar-width: none;
}
.sort-row::-webkit-scrollbar { display: none; }
.sort-btn {
flex-shrink: 0;
background: none;
border: none;
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: .08em;
color: var(–dim);
cursor: pointer;
padding: 3px 8px;
border-radius: 4px;
transition: all .15s;
}
.sort-btn.active { color: var(–cyan); background: #001a2e; }

/* ── list ── */
.list {
flex: 1;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
}
.list::-webkit-scrollbar { display: none; }

/* ── card ── */
.card {
border-bottom: 1px solid var(–border);
padding: 14px 18px;
cursor: pointer;
transition: background .12s;
animation: slideIn .3s ease both;
}
.card:active { background: #080f1f; }
.card.expanded { background: var(–surface); }
@keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.card-top {
display: flex;
align-items: flex-start;
justify-content: space-between;
}
.card-left { flex: 1; }
.card-ticker {
font-family: ‘Syne’, sans-serif;
font-size: 16px;
font-weight: 700;
color: var(–text);
letter-spacing: .02em;
}
.card-name { font-size: 10px; color: var(–dim); margin-top: 1px; }
.sector-tag {
display: inline-block;
font-size: 8px;
padding: 2px 6px;
border-radius: 3px;
margin-top: 4px;
letter-spacing: .06em;
font-weight: 500;
}

.card-right { text-align: right; }
.card-price {
font-family: ‘Syne’, sans-serif;
font-size: 17px;
font-weight: 700;
color: var(–text);
}
.card-ema { font-size: 10px; color: var(–amber); margin-top: 1px; }

/* metrics row */
.metrics {
display: flex;
gap: 0;
margin-top: 12px;
}
.metric {
flex: 1;
text-align: center;
border-right: 1px solid var(–border);
padding: 0 4px;
}
.metric:last-child { border-right: none; }
.metric-val {
font-size: 13px;
font-weight: 500;
line-height: 1;
}
.metric-lbl { font-size: 8px; color: var(–dim); letter-spacing: .06em; margin-top: 3px; }

/* score bar */
.score-row {
display: flex;
align-items: center;
gap: 8px;
margin-top: 11px;
}
.score-bar-bg {
flex: 1;
height: 3px;
background: var(–muted);
border-radius: 2px;
overflow: hidden;
}
.score-bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }
.score-val { font-size: 10px; font-weight: 500; min-width: 28px; text-align: right; }

/* expanded detail */
.detail {
display: none;
margin-top: 14px;
padding-top: 14px;
border-top: 1px solid var(–border);
animation: fadeIn .2s ease;
}
.detail.open { display: block; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.detail-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-bottom: 12px;
}
.detail-box {
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
padding: 10px 12px;
}
.detail-box-label { font-size: 8px; color: var(–dim); letter-spacing: .1em; margin-bottom: 4px; }
.detail-box-val { font-size: 15px; font-weight: 500; }

/* mini sparkline */
.sparkline { width: 100%; height: 50px; }

/* wave structure */
.wave-bar {
height: 4px;
background: var(–muted);
border-radius: 2px;
position: relative;
margin: 10px 0 4px;
overflow: visible;
}
.wave-fill {
position: absolute;
left: 0; top: 0; bottom: 0;
background: linear-gradient(90deg, var(–green), var(–cyan));
border-radius: 2px;
}
.wave-marker {
position: absolute;
top: -5px;
width: 3px; height: 14px;
background: var(–amber);
border-radius: 2px;
transform: translateX(-50%);
}
.wave-labels {
display: flex;
justify-content: space-between;
font-size: 8px;
color: var(–dim);
}

/* chevron */
.chevron {
font-size: 10px;
color: var(–dim);
transition: transform .2s;
margin-left: 8px;
}
.card.expanded .chevron { transform: rotate(180deg); }

/* ── empty / loading ── */
.state-screen {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 12px;
color: var(–dim);
font-size: 12px;
text-align: center;
padding: 40px;
}
.state-icon { font-size: 36px; opacity: .4; }
.spinner {
width: 28px; height: 28px;
border: 2px solid var(–border);
border-top-color: var(–cyan);
border-radius: 50%;
animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* colour helpers */
.c-cyan   { color: var(–cyan); }
.c-green  { color: var(–green); }
.c-amber  { color: var(–amber); }
.c-red    { color: var(–red); }
.c-purple { color: var(–purple); }
.c-dim    { color: var(–dim); }
</style>

</head>
<body>
<div class="ios-top"></div>

<header>
  <div class="header-left">
    <div class="header-title"><span class="dot"></span>W2 Scanner</div>
    <div class="header-sub">XETRA · 40W EMA SETUPS</div>
  </div>
  <div class="header-meta">
    <div class="match-count" id="matchCount">—</div>
    <div class="match-label">SETUPS</div>
    <div class="run-date" id="runDate">loading…</div>
  </div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="chip active" data-sector="all">ALL</button>
</div>

<div class="sort-row">
  <span>SORT:</span>
  <button class="sort-btn active" data-sort="setup_score">SCORE</button>
  <button class="sort-btn" data-sort="dist_pct">Δ EMA</button>
  <button class="sort-btn" data-sort="rs">RS</button>
  <button class="sort-btn" data-sort="wave1_gain">W1 GAIN</button>
  <button class="sort-btn" data-sort="vol_ratio">VOLUME</button>
</div>

<div class="list" id="list">
  <div class="state-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div>Fetching latest setups…</div>
  </div>
</div>

<div class="ios-bot"></div>

<script>
// ── sector colours ────────────────────────────────────────────────────────
const SECTOR_COLORS = {
  Technology: { bg: "#1a1040", fg: "#9b7fff" },
  Industrials:{ bg: "#001a2e", fg: "#00d4ff" },
  Financials: { bg: "#002416", fg: "#23e87a" },
  Logistics:  { bg: "#2a1200", fg: "#f5a623" },
  Chemicals:  { bg: "#2a0020", fg: "#ff7eb3" },
  Utilities:  { bg: "#2a2000", fg: "#f5d623" },
  Automotive: { bg: "#1a0020", fg: "#d07fff" },
  Healthcare: { bg: "#001a1a", fg: "#00e5cc" },
  Telecom:    { bg: "#001020", fg: "#4db8ff" },
  "Real Estate":{ bg:"#1a1000", fg:"#e0a020" },
  Energy:     { bg: "#1a0000", fg: "#ff6b6b" },
  Consumer:   { bg: "#001a08", fg: "#45e085" },
};
const sCol = s => SECTOR_COLORS[s] || { bg:"#111c30", fg:"#3d5068" };

// ── colour helpers ────────────────────────────────────────────────────────
const distColor  = v => v < 4 ? "c-cyan" : v < 7 ? "c-green" : v < 11 ? "c-amber" : "c-dim";
const rsColor    = v => v >= 85 ? "c-cyan" : v >= 70 ? "c-green" : v >= 55 ? "c-amber" : "c-dim";
const scoreColor = v => v >= 85 ? "c-cyan" : v >= 75 ? "c-green" : v >= 65 ? "c-amber" : "c-dim";
const volColor   = v => v >= 1.5 ? "c-green" : v >= 1.1 ? "c-green" : "c-dim";

// ── sparkline ─────────────────────────────────────────────────────────────
function sparklinePath(data, w, h) {
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1))*w;
    const y = h - ((v-min)/range)*(h-8) - 4;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  return pts.join(" ");
}

// ── render cards ──────────────────────────────────────────────────────────
let allData = [], activeFilter = "all", activeSort = "setup_score";

function renderList() {
  const list = document.getElementById("list");
  let data = allData.filter(s => activeFilter === "all" || s.sector === activeFilter);
  data.sort((a,b) => activeSort === "dist_pct" ? a[activeSort]-b[activeSort] : b[activeSort]-a[activeSort]);

  if (!data.length) {
    list.innerHTML = `<div class="state-screen"><div class="state-icon">🔍</div><div>No setups match this filter today.</div></div>`;
    return;
  }

  list.innerHTML = data.map((s, i) => {
    const sc  = sCol(s.sector);
    const sparkW = 200, sparkH = 50;
    const pts = s.chart_data ? sparklinePath(s.chart_data, sparkW, sparkH) : "";
    const emaY = s.chart_data ? (() => {
      const min = Math.min(...s.chart_data), max = Math.max(...s.chart_data), range = max-min||1;
      return (sparkH - ((s.ema40w - min)/range)*(sparkH-8) - 4).toFixed(1);
    })() : 25;
    const retracePct = s.wave1_gain > 0
      ? Math.min(100, ((s.wave1_high - s.pullback_low) / (s.wave1_high - s.wave1_low || 1)) * 100)
      : 50;
    const scoreBarColor = s.setup_score >= 85 ? "var(--cyan)" : s.setup_score >= 75 ? "var(--green)" : s.setup_score >= 65 ? "var(--amber)" : "var(--dim)";

    return `
    <div class="card" id="card-${i}" onclick="toggleCard(${i})" style="animation-delay:${i*40}ms">
      <div class="card-top">
        <div class="card-left">
          <div class="card-ticker">${s.ticker}</div>
          <div class="card-name">${s.name || s.ticker}</div>
          <span class="sector-tag" style="background:${sc.bg};color:${sc.fg}">${s.sector||""}</span>
        </div>
        <div class="card-right" style="display:flex;align-items:flex-start;gap:6px">
          <div>
            <div class="card-price">€${s.price.toFixed(2)}</div>
            <div class="card-ema">EMA €${s.ema40w.toFixed(2)}</div>
          </div>
          <span class="chevron">▼</span>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-val ${distColor(s.dist_pct)}">+${s.dist_pct.toFixed(1)}%</div>
          <div class="metric-lbl">Δ 40W</div>
        </div>
        <div class="metric">
          <div class="metric-val ${rsColor(s.rs)}">${s.rs}</div>
          <div class="metric-lbl">RS</div>
        </div>
        <div class="metric">
          <div class="metric-val ${volColor(s.vol_ratio)}">${s.vol_ratio.toFixed(2)}×</div>
          <div class="metric-lbl">VOL</div>
        </div>
        <div class="metric">
          <div class="metric-val c-dim">${s.wave1_gain.toFixed(0)}%</div>
          <div class="metric-lbl">W1</div>
        </div>
      </div>

      <div class="score-row">
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${s.setup_score}%;background:${scoreBarColor}"></div>
        </div>
        <div class="score-val ${scoreColor(s.setup_score)}">${s.setup_score}</div>
      </div>

      <div class="detail" id="detail-${i}">
        ${pts ? `
        <svg class="sparkline" viewBox="0 0 ${sparkW} ${sparkH}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="sg${i}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--cyan)" stop-opacity=".25"/>
              <stop offset="100%" stop-color="var(--cyan)" stop-opacity=".02"/>
            </linearGradient>
          </defs>
          <polygon points="0,${sparkH} ${pts} ${sparkW},${sparkH}" fill="url(#sg${i})"/>
          <polyline points="${pts}" fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-linejoin="round"/>
          <line x1="0" y1="${emaY}" x2="${sparkW}" y2="${emaY}" stroke="var(--amber)" stroke-width="1" stroke-dasharray="4,3" opacity=".8"/>
        </svg>` : ""}

        <div class="detail-grid">
          <div class="detail-box">
            <div class="detail-box-label">52W HIGH</div>
            <div class="detail-box-val c-amber">€${(s.high_52w||0).toFixed(2)}</div>
          </div>
          <div class="detail-box">
            <div class="detail-box-label">PULLBACK</div>
            <div class="detail-box-val c-purple">${s.pullback_pct.toFixed(0)}%</div>
          </div>
          <div class="detail-box">
            <div class="detail-box-label">W1 LOW</div>
            <div class="detail-box-val c-dim">€${(s.wave1_low||0).toFixed(2)}</div>
          </div>
          <div class="detail-box">
            <div class="detail-box-label">W1 HIGH</div>
            <div class="detail-box-val c-green">€${(s.wave1_high||0).toFixed(2)}</div>
          </div>
        </div>

        <div style="font-size:8px;color:var(--dim);letter-spacing:.1em;margin-bottom:6px">FIBONACCI RETRACE</div>
        <div class="wave-bar">
          <div class="wave-fill" style="width:${retracePct}%"></div>
          <div class="wave-marker" style="left:${retracePct}%"></div>
          <div class="wave-marker" style="left:38.2%;background:var(--dim);opacity:.5"></div>
          <div class="wave-marker" style="left:61.8%;background:var(--dim);opacity:.5"></div>
        </div>
        <div class="wave-labels">
          <span>0%</span><span>38.2%</span><span>61.8%</span><span>100%</span>
        </div>
        <div style="font-size:10px;color:var(--dim);margin-top:10px;line-height:1.6">
          ${s.setup_score >= 85 ? "★ High-conviction. W2 coiling tight above 40W EMA with strong RS." :
            s.setup_score >= 75 ? "Solid W2 structure. Watch for volume confirmation on breakout." :
            "Developing setup. Wait for tighter base before entry."}
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleCard(i) {
  const card   = document.getElementById(`card-${i}`);
  const detail = document.getElementById(`detail-${i}`);
  const isOpen = detail.classList.contains("open");
  // close all
  document.querySelectorAll(".detail.open").forEach(d => d.classList.remove("open"));
  document.querySelectorAll(".card.expanded").forEach(c => c.classList.remove("expanded"));
  if (!isOpen) {
    detail.classList.add("open");
    card.classList.add("expanded");
    setTimeout(() => card.scrollIntoView({ behavior: "smooth", block: "nearest" }), 50);
  }
}

// ── filters ───────────────────────────────────────────────────────────────
function buildFilters() {
  const sectors = ["all", ...Array.from(new Set(allData.map(s => s.sector).filter(Boolean)))];
  const bar = document.getElementById("filterBar");
  bar.innerHTML = sectors.map(s =>
    `<button class="chip ${s===activeFilter?"active":""}" data-sector="${s}">${s==="all"?"ALL":s.toUpperCase()}</button>`
  ).join("");
  bar.querySelectorAll(".chip").forEach(btn => btn.addEventListener("click", () => {
    activeFilter = btn.dataset.sector;
    bar.querySelectorAll(".chip").forEach(b => b.classList.toggle("active", b===btn));
    renderList();
  }));
}

// ── sort ──────────────────────────────────────────────────────────────────
document.querySelectorAll(".sort-btn").forEach(btn => btn.addEventListener("click", () => {
  activeSort = btn.dataset.sort;
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.toggle("active", b===btn));
  renderList();
}));

// ── data loading ──────────────────────────────────────────────────────────
async function loadData() {
  // Try fetching data.json (produced by scanner script)
  try {
    const resp = await fetch("data.json?" + Date.now());
    if (!resp.ok) throw new Error("not found");
    const json = await resp.json();
    allData = json.results || [];
    document.getElementById("matchCount").textContent = allData.length;
    document.getElementById("runDate").textContent = json.run_date || "today";
    buildFilters();
    renderList();
  } catch (e) {
    // Fall back to sample data so the app still looks good
    loadSampleData();
  }
}

function loadSampleData() {
  const today = new Date().toISOString().split("T")[0];
  allData = [
    { ticker:"MUV2", name:"Munich Re", sector:"Financials", price:452.80, ema40w:438.20, dist_pct:3.3, rs:91, vol_ratio:1.09, wave1_gain:62, pullback_pct:28, setup_score:94, high_52w:478.0, wave1_low:290, wave1_high:472, pullback_low:425, chart_data:[290,315,338,360,382,405,428,472,462,450,440,436,432,434,438,441,446,449,453,452] },
    { ticker:"SAP",  name:"SAP SE",    sector:"Technology", price:198.42, ema40w:181.30, dist_pct:9.4, rs:87, vol_ratio:1.05, wave1_gain:104,pullback_pct:24, setup_score:92, high_52w:232.1, wave1_low:112, wave1_high:228, pullback_low:174.5,chart_data:[112,128,140,155,172,190,210,228,220,205,192,185,181,178,180,184,188,192,196,198] },
    { ticker:"ALV",  name:"Allianz SE",sector:"Financials", price:296.10, ema40w:281.40, dist_pct:5.2, rs:82, vol_ratio:1.07, wave1_gain:75, pullback_pct:22, setup_score:88, high_52w:318.5, wave1_low:180, wave1_high:315, pullback_low:272,  chart_data:[180,198,215,232,248,265,280,315,308,298,286,281,276,278,282,287,291,294,297,296] },
