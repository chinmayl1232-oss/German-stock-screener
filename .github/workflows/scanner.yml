name: Run Wave-2 Scanner


on:
  schedule:
    # 17:00 UTC = 18:00 Frankfurt (CET) / 19:00 Frankfurt (CEST summer)
    # Runs Mon–Fri only
    - cron: "0 17 * * 1-5"
  workflow_dispatch:   # also allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to push data.json back to repo

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas rich requests beautifulsoup4

      - name: Run scanner
        run: python scanner.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "📊 Update scan results $(date -u +'%Y-%m-%d')"
          git push
